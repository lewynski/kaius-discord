<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaius | Bots</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="discord-card">
        <div class="profile-section" style="margin-top: 0;">
            <a href="../../index.html" style="color: var(--accent); text-decoration: none; font-size: 18px;">◀ Back to Main</a>
            <div class="divider"></div>
            
            <h1>/bots</h1>
            <p class="username">Displaying bot registry...</p>
            
            <div class="bot-entry" style="background: var(--card-inner); padding: 10px; border-radius: 6px; border: 1px solid #3f4147; margin-bottom: 10px;">
                <h3 style="margin: 0; color: var(--accent);">[BOT NAME HERE]</h3>
                <p style="font-size: 14px; margin: 5px 0;">A cool bot I play with. It has features like custom commands and anime motifs.</p>
                <span style="background: #5865F2; font-size: 12px; padding: 2px 6px; border-radius: 4px;">PLAYED</span>
            </div>
            
            <!-- You can copy and paste the bot-entry div above to add a second bot -->

        </div>
    </div>
</body>
</html>
